name: Test NDI Cloud Api

on:
  # Run once a day
  schedule:
    - cron: '0 0 * * *'
      
  # Allows for manually running this workflow from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_tests:
    name: Test Cloud API (env - ${{ matrix.environment }})
    runs-on: ubuntu-latest
    # matbox dependency resolution calls the GitHub API; authenticate so the
    # requests aren't unauthenticated-rate-limited (which surfaced as a 429
    # "Too Many Requests" from api.github.com during installRequirements).
    # Set at the job level so the Install MatBox step is authenticated too,
    # not just the in-MATLAB setenv below.
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        environment: [prod, dev]
    steps:      
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@aa8bbc7b76daa63c5d456d1430cbd6cb5b626ab4 # v2
        with:
          release: latest
          cache: true

      - name: Clone NDIcalc-vis-matlab as sibling directory
        run: git clone https://github.com/VH-Lab/NDIcalc-vis-matlab.git ../NDIcalc-vis-matlab

      - name: Install MatBox
        uses: ehennestad/matbox-actions/install-matbox@8fe220fbaec9e119ec5081eb917c8e016e275f1e # v1

      - name: Run tests
        uses: matlab-actions/run-command@37b454c384483087929a3d652be474ba585a9659 # v2
        if: always()
        with:
          command: |
            setenv("NDI_CLOUD_USERNAME", "${{ secrets.NDI_CLOUD_USERNAME }}")
            setenv("NDI_CLOUD_PASSWORD", "${{ secrets.NDI_CLOUD_PASSWORD }}")
            setenv("GITHUB_TOKEN", "${{ github.token }}")
            setenv("CLOUD_API_ENVIRONMENT", "${{ matrix.environment }}")
            setenv("NDI_CLOUD_TEST_USER_HAS_MATLAB_LICENSE", "false")
            addpath(genpath( "src" ));
            addpath(genpath( "tests" ));
            addpath(genpath( "tools" ));
            ndi.cloud.authenticate("InteractionEnabled", "off")
            testCloudApi()

      # Publish test results
      - name: Publish test results
        uses: mikepenz/action-junit-report@db71d41eb79864e25ab0337e395c352e84523afe # v4
        with:
          report_paths: 'docs/reports/test-results.xml'

      - name: Restore MATLAB Path
        uses: matlab-actions/run-command@37b454c384483087929a3d652be474ba585a9659 # v2
        if: always()
        with:
          command: |
            restoredefaultpath()
            savepath()
