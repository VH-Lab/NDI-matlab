name: Run NDI Test Suite Cloud Prod

on:
  # Triggers the workflow on push or pull request events for the "main" branch
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - '.github/**'
      - 'docs/reports/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - '.github/workflows/**'
      - 'docs/reports/**'

  # Allows for manually running this workflow from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_tests:
    name: Cloud CI ${{ matrix.part }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        part: [1, 2, 3]
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: latest
          cache: true

      - name: Clone NDIcalc-vis-matlab as sibling directory
        run: git clone https://github.com/VH-Lab/NDIcalc-vis-matlab.git ../NDIcalc-vis-matlab

      - name: Install MatBox
        uses: ehennestad/matbox-actions/install-matbox@v1

      - name: Run tests
        uses: matlab-actions/run-command@v2
        with:
          command: |
            setenv("NDI_CLOUD_USERNAME", "${{ secrets.NDI_CLOUD_USERNAME }}")
            setenv("NDI_CLOUD_PASSWORD", "${{ secrets.NDI_CLOUD_PASSWORD }}")
            setenv("GITHUB_TOKEN", "${{ github.token }}")
            setenv("NDI_CLOUD_TEST_USER_HAS_MATLAB_LICENSE", "false")
            addpath(genpath( "src" ));
            addpath(genpath( "tests" ));
            addpath(genpath( "tools" ));
            ndi.cloud.authenticate("InteractionEnabled", "off")
            testCloudApiProdPart(${{ matrix.part }}, 3)

      # Publish test results
      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'docs/reports/test-results.xml'
          check_name: 'Cloud CI ${{ matrix.part }} test results'

      - name: Restore MATLAB Path
        uses: matlab-actions/run-command@v2
        if: always()
        with:
          command: |
            restoredefaultpath()
            savepath()
