name: Test NDI Symmetry

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_tests:
    name: Run symmetry tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Start virtual display server
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: latest
          cache: true
          products: |
            Communications_Toolbox
            Statistics_and_Machine_Learning_Toolbox
            Signal_Processing_Toolbox

      - name: Install MatBox
        uses: ehennestad/matbox-actions/install-matbox@v1

      - name: Run symmetry tests
        uses: matlab-actions/run-command@v2
        with:
          command: |
            setenv("NDI_CLOUD_USERNAME", "${{ secrets.NDI_CLOUD_USERNAME }}")
            setenv("NDI_CLOUD_PASSWORD", "${{ secrets.NDI_CLOUD_PASSWORD }}")
            addpath(genpath( "src" ));
            ndi.cloud.authenticate("InteractionEnabled", "off")
            addpath(genpath( "tests" ));
            addpath(genpath( "tools" ));
            matbox.installRequirements(fullfile(pwd, 'tests'))
            results = matlab.unittest.TestRunner.withTextOutput.run( testsuite("tests/+ndi/+symmetry") );
            assert(all(~[results.Failed]), "Some symmetry tests failed")

      - name: Restore MATLAB Path
        uses: matlab-actions/run-command@v2
        if: always()
        with:
          command: |
            restoredefaultpath()
            savepath()
