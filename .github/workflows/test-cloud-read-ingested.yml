name: Test Cloud Read Ingested

on:
  workflow_dispatch:

  push:
    branches:
      - claude/add-cloud-unittest-7g8zA

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_test:
    name: Test readIngested
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: latest
          cache: true
          products: |
            Signal_Processing_Toolbox

      - name: Clone NDIcalc-vis-matlab as sibling directory
        run: git clone https://github.com/VH-Lab/NDIcalc-vis-matlab.git ../NDIcalc-vis-matlab

      - name: Install MatBox
        uses: ehennestad/matbox-actions/install-matbox@v1

      - name: Test tgz with embedded zips on Linux
        uses: matlab-actions/run-command@v2
        with:
          command: |
            % Create temp working directory
            workDir = fullfile(tempdir, 'tgz_test');
            if isfolder(workDir); rmdir(workDir, 's'); end
            mkdir(workDir);

            % Create 2 random files and zip each individually
            f1 = fullfile(workDir, 'data1.bin');
            fid = fopen(f1, 'wb'); fwrite(fid, randi(255, 1000, 1), 'uint8'); fclose(fid);
            zip(fullfile(workDir, 'data1.zip'), f1);

            f2 = fullfile(workDir, 'data2.bin');
            fid = fopen(f2, 'wb'); fwrite(fid, randi(255, 500, 1), 'uint8'); fclose(fid);
            zip(fullfile(workDir, 'data2.zip'), f2);

            % Create a third random file (unzipped)
            f3 = fullfile(workDir, 'metadata.txt');
            fid = fopen(f3, 'w'); fprintf(fid, 'name\ttype\nai1\tanalog_in\n'); fclose(fid);

            % Remove the original .bin files so tar only gets zips + metadata
            delete(f1);
            delete(f2);

            % Create .tgz containing the 2 zips and the text file
            tarFile = fullfile(workDir, 'test_archive.nbf.tgz');
            filesToTar = {fullfile(workDir,'data1.zip'), fullfile(workDir,'data2.zip'), f3};
            tar(tarFile, filesToTar);

            % Also create a copy with no extension
            noExtFile = fullfile(workDir, 'test_archive_noext');
            copyfile(tarFile, noExtFile);

            % Check file info
            fi = dir(tarFile);
            fprintf('tgz file size: %d bytes\n', fi.bytes);
            fid = fopen(tarFile, 'rb'); magic = fread(fid, 4, 'uint8'); fclose(fid);
            fprintf('tgz magic bytes: %s\n', sprintf('%02X ', magic));
            [~, ft] = system(sprintf('file "%s"', tarFile));
            fprintf('tgz file type: %s\n', strtrim(ft));
            [~, ft2] = system(sprintf('file "%s"', noExtFile));
            fprintf('noext file type: %s\n', strtrim(ft2));

            % Test 1: untar the .nbf.tgz file
            outDir1 = fullfile(workDir, 'out_tgz');
            mkdir(outDir1);
            try
                untar(tarFile, outDir1);
                fprintf('TEST 1 PASS: untar .nbf.tgz succeeded\n');
                d = dir(fullfile(outDir1, '**'));
                fprintf('  Extracted files: ');
                for i=1:numel(d); if ~d(i).isdir; fprintf('%s ', d(i).name); end; end
                fprintf('\n');
            catch ME
                fprintf('TEST 1 FAIL: untar .nbf.tgz failed: %s\n', ME.message);
            end

            % Test 2: untar the no-extension copy
            outDir2 = fullfile(workDir, 'out_noext');
            mkdir(outDir2);
            try
                untar(noExtFile, outDir2);
                fprintf('TEST 2 PASS: untar no-ext succeeded\n');
            catch ME
                fprintf('TEST 2 FAIL: untar no-ext failed: %s\n', ME.message);
            end

            % Test 3: use system tar to extract the .nbf.tgz
            outDir3 = fullfile(workDir, 'out_system');
            mkdir(outDir3);
            [status, result] = system(sprintf('tar xzf "%s" -C "%s"', tarFile, outDir3));
            if status == 0
                fprintf('TEST 3 PASS: system tar on .nbf.tgz succeeded\n');
            else
                fprintf('TEST 3 FAIL: system tar on .nbf.tgz failed: %s\n', result);
            end

            % Test 4: use system tar on no-extension file
            outDir4 = fullfile(workDir, 'out_system_noext');
            mkdir(outDir4);
            [status, result] = system(sprintf('tar xzf "%s" -C "%s"', noExtFile, outDir4));
            if status == 0
                fprintf('TEST 4 PASS: system tar on no-ext succeeded\n');
            else
                fprintf('TEST 4 FAIL: system tar on no-ext failed: %s\n', result);
            end

            % Cleanup
            rmdir(workDir, 's');
            fprintf('All tgz tests complete.\n');

      - name: Run readIngested test
        uses: matlab-actions/run-command@v2
        with:
          command: |
            setenv("NDI_CLOUD_USERNAME", "${{ secrets.NDI_CLOUD_USERNAME }}")
            setenv("NDI_CLOUD_PASSWORD", "${{ secrets.NDI_CLOUD_PASSWORD }}")
            addpath(genpath( "src" ));
            addpath(genpath( "tests" ));
            addpath(genpath( "tools" ));
            matbox.installRequirements(fullfile(pwd, 'tests'))
            ndi.cloud.authenticate("InteractionEnabled", "off")
            results = runtests('ndi.unittest.cloud.readIngested', 'IncludeSubfolders', false);
            assertSuccess(results);
