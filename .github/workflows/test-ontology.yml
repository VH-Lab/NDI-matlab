name: Test Ontology Lookups Only

on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'src/ndi/+ndi/ontology.m'
      - 'src/ndi/+ndi/+ontology/**'
      - 'tests/+ndi/+unittest/+ontology/**'
      - '.github/workflows/test-ontology.yml'

concurrency:
  group: ontology-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_ontology:
    name: Ontology Lookup Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: latest
          cache: true

      - name: Install MatBox
        uses: ehennestad/matbox-actions/install-matbox@v1

      - name: Run ontology tests
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath("src"));
            addpath(genpath("tests"));
            addpath(genpath("tools"));

            import matlab.unittest.TestRunner
            import matlab.unittest.TestSuite
            import matlab.unittest.plugins.DiagnosticsOutputPlugin

            suite = TestSuite.fromClass(?ndi.unittest.ontology.TestOntologyLookup);
            runner = TestRunner.withTextOutput("Verbosity", "Detailed");

            results = runner.run(suite);

            disp("=== Results Summary ===");
            disp(table(results));

            nFailed = sum([results.Failed]);
            fprintf("\n%d of %d tests failed.\n", nFailed, numel(results));
            assert(nFailed == 0, sprintf("%d test(s) failed", nFailed));
