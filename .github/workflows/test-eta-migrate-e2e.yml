name: V_eta migrate (end-to-end)

# Real-session verification of the V_eta (Brainstorm J) second pass:
# ndi.migrate.local must resolve a deferred stimulus_bath into a validated
# dose_manipulation (D8 retired the bath family) AND assemble a
# stimulus_presentation into a body-backed visual_grating_manipulation
# (+ sampled_body) from the recording graph. That path needs BOTH the
# TargetVersion-aware DID-matlab (with +migrators_j) and the assembled V_eta
# schema set -- which the fast test-eta-migrate.yml (struct assemblers only) and
# run-tests.yml do not provide. This job assembles that environment and runs the
# gated TestMigrateLocalEta (which skips everywhere else).
#
# The DID-matlab, did-schema, and NDI-matlab V_eta branches share a name, so the
# dep refs default to this run's branch (github.ref_name); override via the
# workflow_dispatch input if needed.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'did-matlab / did-schema branch (V_eta line)'
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eta_migrate_e2e:
    name: V_eta second-pass end-to-end
    runs-on: ubuntu-latest
    env:
      DID_MATLAB_REF: ${{ inputs.ref || github.head_ref || github.ref_name }}
      DID_SCHEMA_REF: ${{ inputs.ref || github.head_ref || github.ref_name }}
    steps:
      - name: Check out NDI-matlab
        uses: actions/checkout@v4

      - name: Check out did-schema (for V_eta schemas)
        uses: actions/checkout@v4
        with:
          repository: Waltham-Data-Science/did-schema
          ref: ${{ env.DID_SCHEMA_REF }}
          path: did-schema

      - name: Assemble V_eta schema set (stable + draft)
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/eta-schemas"
          cp did-schema/schemas/V_eta/stable/*.json "${GITHUB_WORKSPACE}/eta-schemas/"
          cp did-schema/schemas/V_eta/draft/*.json  "${GITHUB_WORKSPACE}/eta-schemas/"

      - name: Export env (schema path + eta test gate)
        run: |
          echo "DID_SCHEMA_PATH=${GITHUB_WORKSPACE}/eta-schemas" >> "$GITHUB_ENV"
          echo "NDI_TEST_ETA=1" >> "$GITHUB_ENV"

      - name: Start virtual display server
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: latest
          cache: true
          products: |
            Statistics_and_Machine_Learning_Toolbox

      - name: Install MatBox
        uses: ehennestad/matbox-actions/install-matbox@v1

      - name: Point requirements at the DID-matlab V_eta branch
        # requirements.txt pins a DID-matlab that predates +migrators_j /
        # TargetVersion='V_eta'. Rewrite it to the V_eta branch so v1_to_v2
        # accepts TargetVersion='V_eta'.
        run: |
          set -eux
          python3 - <<'PY'
          import os, pathlib
          ref = os.environ["DID_MATLAB_REF"]
          for rel in ("requirements.txt", "tests/requirements.txt"):
              p = pathlib.Path(rel)
              if not p.exists():
                  continue
              out = []
              for line in p.read_text().splitlines():
                  if "DID-matlab" in line:
                      out.append(line.split("@", 1)[0] + "@" + ref)
                  else:
                      out.append(line)
              p.write_text("\n".join(out) + "\n")
          PY
          grep -i did-matlab requirements.txt tests/requirements.txt || true

      - name: Install repo dependencies (DID-matlab@V_eta, mksqlite, vhlab-toolbox)
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath("src"));
            addpath(genpath("tools"));
            matbox.installRequirements(nditools.projectdir());
            matbox.installRequirements(fullfile(pwd, "tests"));

      - name: Run the V_eta migrate end-to-end test
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath("src"));
            addpath(genpath("tests"));
            results = runtests('ndi.unittest.migrate.TestMigrateLocalEta');
            disp(results);
            assertSuccess(results);
